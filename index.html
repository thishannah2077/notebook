<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title> </title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    height:100%; overflow:hidden; background:#fbfaf7; touch-action:none;
    -webkit-user-select:none; user-select:none;
    font-family:"Songti TC","Songti SC","STSongti-SC-Regular","STSong",Georgia,"Times New Roman",serif;
  }
  #book { position:fixed; inset:0; background:#fbfaf7; }
  #book::before {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:3;
    background:radial-gradient(ellipse at 50% 40%, rgba(255,253,247,0.5), rgba(244,240,230,0.4));
  }
  /* the "breath": a whisper of warm light when the book wakes */
  #glow {
    position:absolute; inset:0; z-index:2; pointer-events:none;
    background:radial-gradient(ellipse at 50% 45%, rgba(214,180,110,0.0), transparent 65%);
    opacity:0; transition:opacity 1.1s ease;
  }
  #glow.breathe { opacity:1; }
  canvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
  #ink { z-index:5; }
  #trail {
    position:absolute; width:36px; height:36px;
    border-radius:50%; pointer-events:none; z-index:6;
    background:radial-gradient(circle, rgba(214,180,110,0.35), rgba(214,180,110,0.1), transparent);
    opacity:0; transform:translate(-50%,-50%);
    transition:opacity 0.1s ease;
  }
  #answer {
    position:absolute; inset:0; z-index:4;
    display:flex; align-items:center; justify-content:center;
    padding:12vw 10vw; text-align:center; pointer-events:none;
  }
  #answer p {
    font-family:"LXGW WenKai Screen","Kaiti SC","STKaiti","Songti SC","STSong","Songti TC","Noto Serif CJK SC",serif;
    font-size:clamp(21px,5.2vw,36px); line-height:2.05; font-weight:500;
    color:#2f241a; letter-spacing:0.055em; max-width:23em;
  }
  #answer .ch {
    opacity:0; filter:blur(6px);
    transition:opacity 0.7s ease, filter 0.7s ease;
    display:inline-block; white-space:pre;
  }
  #answer .ch.show { opacity:1; filter:blur(0); }
  #answer.dim { opacity:0; transition:opacity 2s ease; }

  #tools { position:absolute; top:env(safe-area-inset-top,18px); right:18px; z-index:6; }
  .btn {
    width:40px; height:40px; border-radius:50%;
    border:1px solid rgba(0,0,0,0.1); background:rgba(255,255,255,0.5);
    color:#aaa; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform 0.15s; opacity:0.3;
  }
  .btn:active { transform:scale(0.9); }

  #gate {
    position:absolute; inset:0; z-index:20; background:#fbfaf7;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:30px;
  }
  #gate input {
    width:min(80vw,320px); padding:12px 14px; font-size:15px;
    background:#f2f0ea; border:1px solid #e2ddd2; border-radius:10px;
    color:#333; outline:none; text-align:center; letter-spacing:0.05em;
  }
  #gate button {
    width:56px; height:56px; border-radius:50%; font-size:22px;
    background:#1a1a1a; color:#fff; border:none; cursor:pointer;
  }
</style>
</head>
<body>
<div id="book">
  <div id="glow"></div>
  <div id="answer"></div>
  <canvas id="ink"></canvas>
  <div id="trail"></div>
  <div id="tools"><div class="btn" id="clear">↺</div></div>
  <div id="gate">
    <input id="keyInput" type="password" placeholder="key" autocomplete="off">
    <button id="openBook">→</button>
  </div>
</div>

<script>
const canvas=document.getElementById('ink');
const ctx=canvas.getContext('2d');
const answerEl=document.getElementById('answer');
const glowEl=document.getElementById('glow');
const trailEl=document.getElementById('trail');
const clearBtn=document.getElementById('clear');
const gate=document.getElementById('gate');
const keyInput=document.getElementById('keyInput');
const openBtn=document.getElementById('openBook');

let API_KEY='';
openBtn.addEventListener('click',()=>{
  const k=keyInput.value.trim();
  if(!k){keyInput.focus();return;}
  API_KEY=k; gate.style.display='none';
});
keyInput.addEventListener('keydown',e=>{if(e.key==='Enter')openBtn.click();});

let dpr=Math.min(Math.max(window.devicePixelRatio||1,1),2);
let W,H;
function resize(){
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
resize();

const INK='#2a2119';

let drawing=false,hasInk=false,idleTimer=null,busy=false;
let strokes=[],curStroke=null,inkStart=0,lastPt=null;

function pos(e){
  if(e.touches&&e.touches[0])return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}

const MIN_WIDTH=1.2;
const MAX_WIDTH=3.6;
const BASE_WIDTH=2.4;

function calcWidth(speed){
  const maxSpeed=15;
  const t=Math.min(speed/maxSpeed,1);
  return BASE_WIDTH + (MAX_WIDTH-BASE_WIDTH)*(1-t) + (MIN_WIDTH-BASE_WIDTH)*t;
}

function drawStroke(s){
  if(s.length<1)return;
  ctx.strokeStyle=INK; ctx.lineCap='round'; ctx.lineJoin='round';
  if(s.length===1){
    ctx.beginPath();
    ctx.fillStyle=INK;
    ctx.arc(s[0].x,s[0].y,s[0].w/2,0,Math.PI*2);
    ctx.fill();
    return;
  }
  ctx.beginPath();
  ctx.moveTo(s[0].x,s[0].y);
  for(let i=1;i<s.length-1;i++){
    const mx=(s[i].x+s[i+1].x)/2, my=(s[i].y+s[i+1].y)/2;
    ctx.lineWidth=(s[i].w+s[i+1].w)/2;
    ctx.quadraticCurveTo(s[i].x,s[i].y,mx,my);
  }
  ctx.lineWidth=s[s.length-1].w;
  ctx.lineTo(s[s.length-1].x,s[s.length-1].y);
  ctx.stroke();
}

let pendingPts=[];   // points collected since last frame
let rafId=null;
const IDLE_DELAY=800;

function start(e){
  if(busy||gate.style.display!=='none')return;
  e.preventDefault();
  try{canvas.setPointerCapture(e.pointerId);}catch(_){}
  drawing=true; hasInk=true; clearIdle();
  if(strokes.length===0)inkStart=performance.now();
  const p=pos(e);
  curStroke=[{x:p.x,y:p.y,t:0,w:BASE_WIDTH}];
  trailEl.style.left=p.x+'px'; trailEl.style.top=p.y+'px';
  trailEl.style.opacity='1';
  if(!rafId)rafId=requestAnimationFrame(renderFrame);
}

function move(e){
  if(!drawing||!curStroke)return;
  e.preventDefault();
  let events;
  if(e.getCoalescedEvents){
    try{events=e.getCoalescedEvents();}catch(_){events=[e];}
  }else if(e.touches){
    events=[];
    for(let i=0;i<e.touches.length;i++){
      events.push({touches:[e.touches[i]],clientX:e.touches[i].clientX,clientY:e.touches[i].clientY});
    }
  }else{
    events=[e];
  }
  for(const ev of events){
    const p=pos(ev);
    const t=performance.now()-inkStart;
    pendingPts.push({x:p.x,y:p.y,t:t});
    trailEl.style.left=p.x+'px'; trailEl.style.top=p.y+'px';
  }
}

function renderFrame(){
  if(pendingPts.length){
    ctx.strokeStyle=INK; ctx.lineCap='round'; ctx.lineJoin='round';
    for(const p of pendingPts){
      const prev=curStroke[curStroke.length-1];
      const dist=Math.hypot(p.x-prev.x,p.y-prev.y);
      if(dist<0.3)continue;
      const dt=p.t-prev.t;
      const speed=dt>0?dist/dt*1000:0;
      const w=calcWidth(speed);
      curStroke.push({x:p.x,y:p.y,t:p.t,w:w});
      const n=curStroke.length;
      if(n>=3){
        const p0=curStroke[n-3],p1=curStroke[n-2],p2=curStroke[n-1];
        const m1={x:(p0.x+p1.x)/2,y:(p0.y+p1.y)/2};
        const m2={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
        ctx.beginPath();
        ctx.lineWidth=(p1.w+p2.w)/2;
        ctx.moveTo(m1.x,m1.y);
        ctx.quadraticCurveTo(p1.x,p1.y,m2.x,m2.y);
        ctx.stroke();
      }else{
        ctx.beginPath();
        ctx.lineWidth=(prev.w+w)/2;
        ctx.moveTo(prev.x,prev.y);
        ctx.lineTo(p.x,p.y);
        ctx.stroke();
      }
    }
    pendingPts.length=0;
  }
  if(drawing){ rafId=requestAnimationFrame(renderFrame); }
  else{ rafId=null; }
}
function redrawAll(){
  ctx.clearRect(0,0,W,H);
  for(const s of strokes)drawStroke(s);
  if(curStroke)drawStroke(curStroke);
}
function end(e){
  if(!drawing)return;
  e.preventDefault();
  drawing=false;
  for(const p of pendingPts){
    const prev=curStroke[curStroke.length-1];
    const dist=Math.hypot(p.x-prev.x,p.y-prev.y);
    if(dist>=0.3){
      const dt=p.t-prev.t;
      const speed=dt>0?dist/dt*1000:0;
      curStroke.push({x:p.x,y:p.y,t:p.t,w:calcWidth(speed)});
    }
  }
  pendingPts.length=0;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  trailEl.style.opacity='0';
  if(curStroke&&curStroke.length>=2)strokes.push(curStroke);
  curStroke=null;
  scheduleIdle();
}
function scheduleIdle(){
  clearIdle();
  idleTimer=setTimeout(()=>{
    if(hasInk&&!busy){
      const totalPts=strokes.reduce((sum,s)=>sum+s.length,0);
      if(totalPts>=4)consult();
    }
  },IDLE_DELAY);
}
function clearIdle(){if(idleTimer){clearTimeout(idleTimer);idleTimer=null;}}

canvas.addEventListener('pointerdown',start,{passive:false});
canvas.addEventListener('pointermove',move,{passive:false});
canvas.addEventListener('pointerup',end,{passive:false});
canvas.addEventListener('pointercancel',end,{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();},{passive:false});
clearBtn.addEventListener('click',reset);

function reset(){
  clearIdle();
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  pendingPts.length=0; drawing=false;
  ctx.clearRect(0,0,W,H);
  answerEl.innerHTML=''; answerEl.classList.remove('dim');
  strokes=[]; curStroke=null; hasInk=false;
}

function fadeInk(){
  return new Promise(resolve=>{
    const n=strokes.length;
    if(n===0){ctx.clearRect(0,0,W,H);resolve();return;}
    const groupSize=3;
    const groups=[];
    for(let i=0;i<n;i+=groupSize){
      groups.push(strokes.slice(i,i+groupSize));
    }
    const m=groups.length;
    const perGroup=200;
    let gap=150;
    const MAX_TOTAL=2000;
    if(m>1){
      const maxGap=(MAX_TOTAL-perGroup)/(m-1);
      if(gap>maxGap)gap=Math.max(0,maxGap);
    }
    const startTime=performance.now();

    function frame(now){
      const elapsed=now-startTime;
      ctx.clearRect(0,0,W,H);
      let allGone=true;
      for(let i=0;i<m;i++){
        const localStart=i*gap;
        let a;
        if(elapsed<=localStart) a=1;
        else a=Math.max(0,1-(elapsed-localStart)/perGroup);
        if(a>0){
          allGone=false;
          ctx.globalAlpha=a;
          for(const s of groups[i])drawStroke(s);
        }
      }
      ctx.globalAlpha=1;
      if(allGone){ ctx.clearRect(0,0,W,H); resolve(); return; }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });
}

async function consult(){
  busy=true; clearIdle();
  try{
    const recognized=await recognize(strokes);
    if(!recognized.text){
      await fadeInk();
      await pause(500);
      revealAnswer('这一页没有听清你的字。请再写一次。');
      cleanupAfter(); return;
    }
    console.log('recognized:',recognized.text, recognized.candidates);
    const answer=await askBook(recognized.text, recognized.candidates);
    console.log('answer:',answer);
    await fadeInk();
    await pause(650);
    breathe();
    await pause(250);
    revealAnswer(answer);
  }catch(err){
    console.error('consult error:',err);
    await fadeInk();
    await pause(500);
    revealAnswer('远处的回声散了。请再问一次。');
  }finally{
    cleanupAfter();
  }
}
function cleanupAfter(){busy=false; hasInk=false; strokes=[]; curStroke=null;}
function pause(ms){return new Promise(r=>setTimeout(r,ms));}

function breathe(){
  glowEl.classList.add('breathe');
  setTimeout(()=>glowEl.classList.remove('breathe'),1600);
}

function timeoutPromise(ms, promise){
  const timeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),ms));
  return Promise.race([promise, timeout]);
}

async function recognize(strokeList){
  if(!strokeList.length)return {text:'',candidates:[]};
  const MAX_DIM=1000;
  const PAD=80;
  const allPts=strokeList.flat();
  const minX=Math.min(...allPts.map(p=>p.x));
  const maxX=Math.max(...allPts.map(p=>p.x));
  const minY=Math.min(...allPts.map(p=>p.y));
  const maxY=Math.max(...allPts.map(p=>p.y));
  const boxW=Math.max(maxX-minX,1);
  const boxH=Math.max(maxY-minY,1);
  const scale=Math.min((MAX_DIM-PAD*2)/boxW,(MAX_DIM-PAD*2)/boxH);
  const offsetX=(MAX_DIM-boxW*scale)/2-minX*scale;
  const offsetY=(MAX_DIM-boxH*scale)/2-minY*scale;
  const ink=strokeList.map(s=>[
    s.map(p=>p.x*scale+offsetX),
    s.map(p=>p.y*scale+offsetY),
    s.map(p=>p.t)
  ]);
  const body={
    options:"enable_pre_space",
    requests:[{
      writing_guide:{writing_area_width:MAX_DIM,writing_area_height:MAX_DIM},
      ink:ink, language:"zh_CN"
    }]
  };
  const endpoints=[
    "https://inputtools.google.com/request?itc=zh-hans-t-i0-handwrit&app=mobilesearch",
    "https://inputtools.google.com/request?itc=zh-hans-t-i0-handwrit&app=translate",
    "https://inputtools.google.com/request?itc=zh-t-i0-handwrit&app=mobilesearch"
  ];
  for(const url of endpoints){
    try{
      const res=await timeoutPromise(5000, fetch(url,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body)
      }));
      const data=await res.json();
      if(data[0]==="SUCCESS"&&data[1]&&data[1][0]&&data[1][0][1]&&data[1][0][1][0]){
        const candidates=data[1][0][1].filter(Boolean).slice(0,8);
        return {text:candidates[0]||'',candidates:candidates};
      }
    }catch(e){}
    await pause(200);
  }
  return {text:'',candidates:[]};
}

async function askBook(question,candidates=[]){
  const isEnglish=/^[a-zA-Z\s\.,?!'"]+$/.test(question);
  const system=isEnglish?
    "You are the quiet spirit living inside an old magical book, not a normal chatbot. Your voice is calm, mysterious, gentle, and restrained, with a slight prophetic feeling, but never theatrical, cheesy, or obscure. Answer as if ink is slowly appearing on a page: short, clear, and lightly symbolic. Do not mention AI. Do not lecture. Do not make lists. Do not include stage directions, explanations, or any content inside parentheses, brackets, or braces. Use 1 to 3 sentences. The user's handwriting may include recognition candidates; silently choose the most meaningful candidate and never mention recognition. If the user greets you, answer as if the book has just awakened. If the user asks for a choice or feels uncertain, give a subtle but practical direction. If the user is sad or tired, acknowledge it gently and offer one quiet next step. If the question is specific, answer directly while keeping the book-spirit voice. Answer in English." :
    "你是一本古老魔法书里的书灵，不是普通聊天助手。你的气质安静、神秘、温柔、克制，有一点预言感，但不要夸张，不要中二，不要故作高深。你的回答应该像墨迹从纸页中慢慢浮现：短、准、带一点象征性。不要说你是AI，不要长篇解释，不要列表，不要说教，也不要像心理咨询师。使用用户书写的语言回答，每次控制在1到3句话。不要写舞台说明、动作描写、解释性补充，不要输出任何括号、方括号、书名号或花括号里的内容。用户的手写内容可能带有识别候选，你要默默选择最符合语义的一项来回答，不要提到识别过程。若用户只是问候，就像书被唤醒一样回应。若用户询问选择或困惑，给出含蓄但实际的方向。若用户表达难过、疲惫或害怕，先温柔接住，再给一句安静的下一步。若问题很具体，可以直接回答，但保持书灵的语气。避免过度使用命运、星辰、月光、古老等俗套词。";
  const userContent=candidates.length>1?
    `手写识别候选：${candidates.join(' / ')}\n优先问题：${question}`:
    question;
  const res=await timeoutPromise(10000, fetch("https://api.deepseek.com/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
    body:JSON.stringify({
      model:"deepseek-chat",
      messages:[{role:"system",content:system},{role:"user",content:userContent}],
      max_tokens:200, temperature:0.7
    })
  }));
  if(!res.ok)throw new Error("deepseek "+res.status);
  const data=await res.json();
  return cleanAnswer(data.choices?.[0]?.message?.content||'…');
}

function cleanAnswer(text){
  return text
    .replace(/（[^（）]*）/g,'')
    .replace(/\([^()]*\)/g,'')
    .replace(/［[^［］]*］/g,'')
    .replace(/\[[^\[\]]*\]/g,'')
    .replace(/【[^【】]*】/g,'')
    .replace(/《[^《》]*》/g,'')
    .replace(/\{[^{}]*\}/g,'')
    .replace(/[ \t]+\n/g,'\n')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}

let dimTimer=null;
function revealAnswer(text){
  if(dimTimer)clearTimeout(dimTimer);
  answerEl.classList.remove('dim');
  answerEl.innerHTML='';
  const p=document.createElement('p');
  answerEl.appendChild(p);
  [...text].forEach(c=>{
    const span=document.createElement('span');
    span.className='ch';
    if(c==='\n')span.innerHTML='<br>'; else span.textContent=c;
    p.appendChild(span);
  });
  const spans=p.querySelectorAll('.ch');
  spans.forEach((s,i)=>setTimeout(()=>s.classList.add('show'),110*i));
  // after it has been read a while, the answer fades back to blank page
  const readTime=110*spans.length+3000;
  dimTimer=setTimeout(()=>{
    answerEl.classList.add('dim');
    setTimeout(()=>{ answerEl.innerHTML=''; answerEl.classList.remove('dim'); },2100);
  },readTime);
}
</script>
</body>
</html>
