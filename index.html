<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title> </title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    height:100%; overflow:hidden; background:#fbfaf7; touch-action:none;
    -webkit-user-select:none; user-select:none;
    font-family:"Songti TC","Songti SC","STSongti-SC-Regular","STSong",Georgia,"Times New Roman",serif;
  }
  #book { position:fixed; inset:0; background:#fbfaf7; }
  /* very faint paper grain — stays white, just gives the surface a texture */
  #book::before {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:3;
    opacity:0.5; mix-blend-mode:multiply;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(120,110,90,0.025) 0 1px, transparent 1px),
      radial-gradient(circle at 70% 60%, rgba(120,110,90,0.02) 0 1px, transparent 1px),
      radial-gradient(circle at 40% 80%, rgba(120,110,90,0.025) 0 1px, transparent 1px);
    background-size:7px 7px, 11px 11px, 9px 9px;
  }
  /* the "breath": a whisper of warm light when the book wakes */
  #glow {
    position:absolute; inset:0; z-index:2; pointer-events:none;
    background:radial-gradient(ellipse at 50% 45%, rgba(214,180,110,0.0), transparent 65%);
    opacity:0; transition:opacity 1.1s ease;
  }
  #glow.breathe { opacity:1; }
  canvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
  #ink { z-index:5; }
  #answer {
    position:absolute; inset:0; z-index:4;
    display:flex; align-items:center; justify-content:center;
    padding:12vw 10vw; text-align:center; pointer-events:none;
  }
  #answer p {
    font-family:"Songti TC","Songti SC","STSong",Georgia,serif;
    font-size:clamp(20px,5vw,34px); line-height:2; font-weight:500;
    color:#1a1a1a; letter-spacing:0.08em; max-width:24em;
  }
  #answer .ch {
    opacity:0; filter:blur(6px);
    transition:opacity 0.7s ease, filter 0.7s ease;
    display:inline-block; white-space:pre;
  }
  #answer .ch.show { opacity:1; filter:blur(0); }
  #answer.dim { opacity:0; transition:opacity 2s ease; }

  #tools { position:absolute; top:env(safe-area-inset-top,18px); right:18px; z-index:6; }
  .btn {
    width:40px; height:40px; border-radius:50%;
    border:1px solid rgba(0,0,0,0.1); background:rgba(255,255,255,0.5);
    color:#aaa; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform 0.15s; opacity:0.3;
  }
  .btn:active { transform:scale(0.9); }

  #gate {
    position:absolute; inset:0; z-index:20; background:#fbfaf7;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:30px;
  }
  #gate input {
    width:min(80vw,320px); padding:12px 14px; font-size:15px;
    background:#f2f0ea; border:1px solid #e2ddd2; border-radius:10px;
    color:#333; outline:none; text-align:center; letter-spacing:0.05em;
  }
  #gate button {
    width:56px; height:56px; border-radius:50%; font-size:22px;
    background:#1a1a1a; color:#fff; border:none; cursor:pointer;
  }
</style>
</head>
<body>
<div id="book">
  <div id="glow"></div>
  <div id="answer"></div>
  <canvas id="ink"></canvas>
  <div id="tools"><div class="btn" id="clear">↺</div></div>
  <div id="gate">
    <input id="keyInput" type="password" placeholder="key" autocomplete="off">
    <button id="openBook">→</button>
  </div>
</div>

<script>
const canvas=document.getElementById('ink');
const ctx=canvas.getContext('2d');
const answerEl=document.getElementById('answer');
const glowEl=document.getElementById('glow');
const clearBtn=document.getElementById('clear');
const gate=document.getElementById('gate');
const keyInput=document.getElementById('keyInput');
const openBtn=document.getElementById('openBook');

let API_KEY='';
openBtn.addEventListener('click',()=>{
  const k=keyInput.value.trim();
  if(!k){keyInput.focus();return;}
  API_KEY=k; gate.style.display='none';
});
keyInput.addEventListener('keydown',e=>{if(e.key==='Enter')openBtn.click();});

let dpr=Math.max(window.devicePixelRatio||1,1);
let W,H;
function resize(){
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
resize();

const INK='#1c1712';

let drawing=false,hasInk=false,idleTimer=null,busy=false;
// each stroke = array of points {x,y,t,w}  (w = pen width at that point)
let strokes=[],curStroke=null,inkStart=0,lastPt=null;

function pos(e){
  if(e.touches&&e.touches[0])return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}

// ---- pen width from speed: slow = thick, fast = thin (calligraphic feel) ----
function widthForSpeed(v){
  // v in px/ms. clamp to a pleasant range.
  const wMax=5.2, wMin=1.6;
  const w=wMax-(v*3.2);
  return Math.max(wMin,Math.min(wMax,w));
}

function drawSegment(a,b){
  ctx.strokeStyle=INK;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.lineWidth=b.w;
  ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
  ctx.stroke();
}

function start(e){
  if(busy||gate.style.display!=='none')return;
  e.preventDefault();
  drawing=true; hasInk=true; clearIdle();
  if(strokes.length===0)inkStart=Date.now();
  const p=pos(e); const t=Date.now();
  const pt={x:p.x,y:p.y,t:t-inkStart,w:widthForSpeed(0)};
  curStroke=[pt]; lastPt={x:p.x,y:p.y,tAbs:t};
}
function move(e){
  if(!drawing)return;
  e.preventDefault();
  // iPad / Apple Pencil fires far more points than pointermove delivers;
  // pull the coalesced ones so the line stays continuous and the data is complete.
  const events=(e.getCoalescedEvents&&e.getCoalescedEvents().length)?e.getCoalescedEvents():[e];
  for(const ev of events){
    const p=pos(ev); const t=Date.now();
    const dt=Math.max(1,t-lastPt.tAbs);
    const dist=Math.hypot(p.x-lastPt.x,p.y-lastPt.y);
    const v=dist/dt;
    const w=widthForSpeed(v);
    const pt={x:p.x,y:p.y,t:t-inkStart,w};
    drawSegment(curStroke[curStroke.length-1],pt);
    curStroke.push(pt);
    lastPt={x:p.x,y:p.y,tAbs:t};
  }
}
function end(e){
  if(!drawing)return;
  e.preventDefault();
  drawing=false;
  if(curStroke&&curStroke.length)strokes.push(curStroke);
  curStroke=null;
  scheduleIdle();
}
function scheduleIdle(){
  clearIdle();
  idleTimer=setTimeout(()=>{if(hasInk&&!busy)consult();},600);
}
function clearIdle(){if(idleTimer){clearTimeout(idleTimer);idleTimer=null;}}

canvas.addEventListener('pointerdown',start);
canvas.addEventListener('pointermove',move);
canvas.addEventListener('pointerup',end);
canvas.addEventListener('pointercancel',end);
clearBtn.addEventListener('click',reset);

function reset(){
  clearIdle();
  ctx.clearRect(0,0,W,H);
  answerEl.innerHTML=''; answerEl.classList.remove('dim');
  strokes=[]; curStroke=null; hasInk=false;
}

// redraw all committed strokes with a global multiplier on opacity
function repaint(globalAlpha){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle=INK; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.globalAlpha=globalAlpha;
  for(const s of strokes){
    for(let i=1;i<s.length;i++){
      ctx.beginPath();
      ctx.lineWidth=s[i].w;
      ctx.moveTo(s[i-1].x,s[i-1].y);
      ctx.lineTo(s[i].x,s[i].y);
      ctx.stroke();
    }
  }
  ctx.globalAlpha=1;
}

// ---- fade the ink away in writing order: stroke by stroke, timed & reliable ----
function fadeInk(){
  return new Promise(resolve=>{
    const n=strokes.length;
    if(n===0){ctx.clearRect(0,0,W,H);resolve();return;}
    const MAX_TOTAL=3000;  // whole fade must finish within 3s
    const perStroke=260;   // ms for one stroke to fully fade
    // total = (n-1)*gap + perStroke  ->  keep it <= MAX_TOTAL by shrinking gap
    let gap=120;
    if(n>1){
      const maxGap=(MAX_TOTAL-perStroke)/(n-1);
      if(gap>maxGap)gap=Math.max(0,maxGap);
    }
    const startTime=performance.now();

    function frame(now){
      const elapsed=now-startTime;
      ctx.clearRect(0,0,W,H);
      ctx.strokeStyle=INK; ctx.lineCap='round'; ctx.lineJoin='round';
      let allGone=true;
      for(let i=0;i<n;i++){
        const localStart=i*gap;
        let a;
        if(elapsed<=localStart) a=1;
        else a=Math.max(0,1-(elapsed-localStart)/perStroke);
        if(a>0){
          allGone=false;
          ctx.globalAlpha=a;
          const s=strokes[i];
          for(let j=1;j<s.length;j++){
            ctx.beginPath();
            ctx.lineWidth=s[j].w;
            ctx.moveTo(s[j-1].x,s[j-1].y);
            ctx.lineTo(s[j].x,s[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha=1;
      if(allGone){ ctx.clearRect(0,0,W,H); resolve(); return; }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });
}

async function consult(){
  busy=true; clearIdle();
  try{
    const text=await recognize(strokes);
    if(!text){
      await fadeInk();
      await pause(500);
      revealAnswer('墨迹未干，字影已散。请再书一遍。');
      cleanupAfter(); return;
    }
    const answer=await askBook(text);
    await fadeInk();          // ink dissolves in writing order
    await pause(650);         // full-white silence
    breathe();                // book stirs
    await pause(250);
    revealAnswer(answer);     // answer surfaces
  }catch(err){
    await fadeInk();
    await pause(500);
    revealAnswer('书页晦暗，一时无言。稍待再问。');
    console.error(err);
  }finally{
    cleanupAfter();
  }
}
function cleanupAfter(){busy=false; hasInk=false; strokes=[]; curStroke=null;}
function pause(ms){return new Promise(r=>setTimeout(r,ms));}

function breathe(){
  glowEl.classList.add('breathe');
  setTimeout(()=>glowEl.classList.remove('breathe'),1600);
}

async function recognize(strokeList){
  if(!strokeList.length)return '';
  const ink=strokeList.map(s=>[s.map(p=>p.x),s.map(p=>p.y),s.map(p=>p.t)]);
  const body={
    options:"enable_pre_space",
    requests:[{
      writing_guide:{writing_area_width:W,writing_area_height:H},
      ink:ink, language:"zh_CN"
    }]
  };
  const res=await fetch("https://inputtools.google.com/request?itc=zh-t-i0-handwrit&app=mobilesearch",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  const data=await res.json();
  if(data[0]==="SUCCESS"&&data[1]&&data[1][0]&&data[1][0][1]&&data[1][0][1][0]){
    return data[1][0][1][0];
  }
  return '';
}

async function askBook(question){
  const system="你是一本古老而通灵的书，回应写在你书页上的疑问。用现代、清楚的人话回答——像一个真正在对面跟人说话的存在，不用文言，不掉书袋。但你的语气始终笼着一层神秘：你仿佛知道一些别人不知道的事，话里有留白、有暗示，偶尔点到即止，让人心里一动。真正回应对方的问题，给出有意义、有分量的话，而不是空泛的玄虚。简短，二到四句。用对方书写的语言回答。不复述问题，不加引号，不用『施主』『汝』这类古语，直接说出书的回应。";
  const res=await fetch("https://api.deepseek.com/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
    body:JSON.stringify({
      model:"deepseek-chat",
      messages:[{role:"system",content:system},{role:"user",content:question}],
      max_tokens:200, temperature:1.0
    })
  });
  if(!res.ok)throw new Error("deepseek "+res.status);
  const data=await res.json();
  return (data.choices?.[0]?.message?.content||'…').trim();
}

let dimTimer=null;
function revealAnswer(text){
  if(dimTimer)clearTimeout(dimTimer);
  answerEl.classList.remove('dim');
  answerEl.innerHTML='';
  const p=document.createElement('p');
  answerEl.appendChild(p);
  [...text].forEach(c=>{
    const span=document.createElement('span');
    span.className='ch';
    if(c==='\n')span.innerHTML='<br>'; else span.textContent=c;
    p.appendChild(span);
  });
  const spans=p.querySelectorAll('.ch');
  spans.forEach((s,i)=>setTimeout(()=>s.classList.add('show'),110*i));
  // after it has been read a while, the answer fades back to blank page
  const readTime=110*spans.length+3000;
  dimTimer=setTimeout(()=>{
    answerEl.classList.add('dim');
    setTimeout(()=>{ answerEl.innerHTML=''; answerEl.classList.remove('dim'); },2100);
  },readTime);
}
</script>
</body>
</html>
